name: Build & Release (All Platforms)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: dist:win
          - os: macos-latest
            cmd: dist:mac
          - os: ubuntu-latest
            cmd: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install
      - run: cd renderer && npm install

      - name: Build per OS
        run: npm run ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ FIX: upload the entire dist folder contents flat
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ✅ FIX: download each platform into its own subdir
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      # ✅ FIX: flatten all artifacts into a single release-assets/ folder
      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find all-artifacts -type f \( \
            -name "*.exe" \
            -o -name "*.dmg" \
            -o -name "*.AppImage" \
            -o -name "latest*.yml" \
            -o -name "latest*.yaml" \
          \) -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          # Optional: auto-generate release notes from commits
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}